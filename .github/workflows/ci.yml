name: CI

on:
  push:
    branches:
      - main
  pull_request: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint API
        run: pnpm --filter @qara/api lint

      - name: Typecheck API
        run: pnpm --filter @qara/api exec tsc -p tsconfig.build.json --noEmit

      - name: API unit tests
        run: pnpm --filter @qara/api test

      - name: Web build
        run: pnpm --filter @qara/web build
